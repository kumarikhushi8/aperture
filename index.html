<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <title>Aperture — Weather, Framed</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/frame.css">
    <link rel="stylesheet" href="css/scene.css">
    <link rel="stylesheet" href="css/scrubber.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="window-frame">
        <div class="frame-chrome"></div>
        <div class="scene-stage">
            <div class="sky-layer"></div>
            <div class="celestial-layer">
                <svg class="celestial-path" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="sun-moon-arc" d="M 5,90 Q 50,-10 95,90" fill="none" stroke="none" />
                </svg>
                <div class="sun"></div>
                <div class="moon"></div>
            </div>
            <div class="cloud-layer">
                <div class="cloud cloud-1"></div>
                <div class="cloud cloud-2"></div>
                <div class="cloud cloud-3"></div>
            </div>
            <div class="silhouette-far">
                <svg class="silhouette-svg silhouette-rural" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,180 150,60 300,150 450,40 600,140 750,70 900,160 1000,100 1000,300" />
                </svg>
                <svg class="silhouette-svg silhouette-urban" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,120 60,120 60,90 110,90 110,140 160,140 160,60 210,60 210,150 270,150 270,100 320,100 320,160 380,160 380,80 430,80 430,170 500,170 500,110 560,110 560,180 620,180 620,90 680,90 680,190 740,190 740,130 800,130 800,200 860,200 860,140 920,140 920,210 1000,210 1000,300" />
                </svg>
            </div>
            <div class="silhouette-mid">
                <svg class="silhouette-svg silhouette-rural" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,200 100,110 220,190 340,90 480,180 600,100 720,200 840,120 1000,190 1000,300" />
                </svg>
                <svg class="silhouette-svg silhouette-urban" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,160 50,160 50,130 90,130 90,170 140,170 140,100 190,100 190,180 240,180 240,140 300,140 300,190 360,190 360,110 410,110 410,200 470,200 470,150 530,150 530,210 590,210 590,120 650,120 650,220 720,220 720,160 780,160 780,230 850,230 850,170 920,170 920,240 1000,240 1000,300" />
                </svg>
            </div>
            <div class="fog-layer"></div>
            <div class="silhouette-near">
                <svg class="silhouette-svg silhouette-rural" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,230 80,150 180,220 280,140 400,210 520,130 640,220 760,150 880,210 1000,170 1000,300" />
                </svg>
                <svg class="silhouette-svg silhouette-urban" viewBox="0 0 1000 300" preserveAspectRatio="none">
                    <polygon points="0,300 0,190 40,190 40,150 80,150 80,200 130,200 130,110 180,110 180,210 230,210 230,160 290,160 290,220 350,220 350,120 410,120 410,230 470,230 470,170 540,170 540,240 610,240 610,130 680,130 680,250 750,250 750,180 830,180 830,260 910,260 910,140 1000,140 1000,300" />
                </svg>
            </div>
            <canvas class="particle-canvas"></canvas>
            <div class="lightning-overlay"></div>
        </div>
        <div class="frame-top">
            <form class="nameplate-search">
                <input type="text" placeholder="Search city...">
            </form>
            <button type="button" class="unit-toggle">°C</button>
        </div>
        <div class="scene-readout">
            <h1 class="temp-display">72°</h1>
            <p class="condition-text">Partly Cloudy</p>
            <p class="feels-like-text">Feels like 75°</p>
        </div>
        <div class="time-scrubber-dock">
            <div class="scrubber-track-hourly"></div>
            <div class="scrubber-handle"></div>
            <div class="scrubber-label"></div>
            <div class="scrubber-track-daily"></div>
        </div>
        <div class="windowsill">
            <dl class="sill-stats">
                <div class="stat-item">
                    <dt>Humidity</dt>
                    <dd class="stat-humidity">--%</dd>
                </div>
                <div class="stat-item">
                    <dt>Wind</dt>
                    <dd class="stat-wind">-- km/h</dd>
                </div>
                <div class="stat-item">
                    <dt>Pressure</dt>
                    <dd class="stat-pressure">-- hPa</dd>
                </div>
                <div class="stat-item">
                    <dt>UV Index</dt>
                    <dd class="stat-uv">--</dd>
                </div>
            </dl>
        </div>
        <div class="mobile-sheet"></div>
        <div class="loading-state"></div>
        <div class="error-state"></div>
    </div>

<script src="js/api.js"></script>
<script src="js/sceneMapper.js"></script>
<script src="js/particles.js"></script>
<script src="js/scrubber.js"></script>
<script src="js/main.js"></script>

</body>
</html>
